name: Backup Quotidien MongoDB
description: Sauvegarde automatique de la base MongoDB avec rotation de 7 jours

on:
  schedule:
    - cron: '0 2 * * *'  # Tous les jours à 2h du matin
  workflow_dispatch:  # Manuel aussi

jobs:
  backup:
    runs-on: ubuntu-latest
    
    steps:
    - name: SSH et Backup sur EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/itvision-1
          
          # Créer dossier backup avec date
          BACKUP_DIR="./backups/$(date +%Y%m%d_%H%M%S)"
          mkdir -p $BACKUP_DIR
          
          # Dump MongoDB
          docker exec itvision-mongodb mongodump \
            --username itvision_app \
            --password ${{ secrets.MONGO_APP_PASSWORD }} \
            --authenticationDatabase itvision_db \
            --db itvision_db \
            --out /tmp/mongodump
          
          # Copier hors du container
          docker cp itvision-mongodb:/tmp/mongodump $BACKUP_DIR/
          
          # Compresser
          tar -czf ${BACKUP_DIR}.tar.gz -C $BACKUPDIR .
          rm -rf $BACKUP_DIR
          
          # Garder seulement 7 derniers backups
          ls -t ./backups/*.tar.gz | tail -n +8 | xargs rm -f
          
          echo "✅ Backup créé: ${BACKUP_DIR}.tar.gz"
    
    - name: Notification Slack (optionnel)
      if: failure()
      run: |
        curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"❌ Backup MongoDB EC2 échoué!"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}
