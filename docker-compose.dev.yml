version: '3.8'

# Compose léger pour développement local — MongoDB SANS authentification
# Usage: docker-compose -f docker-compose.dev.yml up -d

services:
  mongodb-dev:
    image: mongo:7.0
    container_name: itvision-mongodb-dev
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongodb_dev_data:/data/db
    command: ["mongod", "--bind_ip_all"]
    # Pas d'auth, pas de MONGO_INITDB_ROOT_USERNAME → accès libre en local

volumes:
  mongodb_dev_data:
    driver: local
