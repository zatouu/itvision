# Upstream Docker vers l'application Next.js.
# Le nom "app" correspond au service Docker Compose "app".
# Nginx envoie toutes les requêtes web vers ce backend interne sur le port 3000.
upstream app {
    server app:3000;
    keepalive 32;
}

# Entrée HTTP publique.
# Ce bloc accepte le site corporate et le sous-domaine marketplace.
# Le header Host est conservé dans les proxy_set_header pour que le middleware Next.js
# distingue itvisionplus.sn de market.itvisionplus.sn.
server {
    listen 80;
    server_name itvisionplus.sn www.itvisionplus.sn market.itvisionplus.sn itvision.sn www.itvision.sn localhost;

    # Challenge Let's Encrypt utilisé par Certbot pour générer/renouveler les certificats SSL.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health check Nginx utilisé par Docker Compose.
    # Il vérifie que Nginx répond, sans dépendre directement de Next.js.
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Redirection HTTPS à activer quand les certificats SSL sont installés.
    # À garder commenté tant que Certbot n'a pas encore généré les certificats.
    # return 301 https://$server_name$request_uri;

    # Proxy principal vers Next.js.
    # Toutes les pages passent par l'upstream app:3000.
    # Host est volontairement conservé pour la logique subdomain routing du middleware.
    location / {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts standards pour les pages et APIs classiques.
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Fichiers statiques générés par Next.js.
    # Cache long car ces fichiers sont versionnés par hash.
    location /_next/static {
        proxy_pass http://app;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Fichiers uploadés persistés dans le volume Docker partagé uploads_data.
    # Nginx les sert directement, sans repasser par Next.js.
    location /uploads {
        alias /var/www/uploads;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API d'upload avec limite de taille et timeouts étendus.
    # Utile pour images/vidéos/fichiers plus lourds.
    location /api/upload {
        limit_req zone=api burst=5 nodelay;
        client_max_body_size 150m;
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }

    # Rate limiting global des routes API pour réduire les abus.
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rate limiting strict pour le login afin de limiter les tentatives brute-force.
    location /api/auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

