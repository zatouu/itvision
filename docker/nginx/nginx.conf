# Utilisateur Linux utilisé par les workers Nginx dans le container.
user nginx;

# Nombre de processus workers. "auto" laisse Nginx s'adapter aux CPU disponibles.
worker_processes auto;

# Fichier de logs des erreurs Nginx. Le niveau "warn" garde les alertes utiles sans trop de bruit.
error_log /var/log/nginx/error.log warn;

# Fichier PID utilisé par Nginx pour suivre le processus principal.
pid /var/run/nginx.pid;

events {
    # Nombre maximum de connexions simultanées par worker.
    worker_connections 1024;

    # Backend d'événements performant sur Linux.
    use epoll;

    # Permet à un worker d'accepter plusieurs connexions en une seule boucle.
    multi_accept on;
}

http {
    # Types MIME standards pour servir correctement CSS, JS, images, etc.
    include /etc/nginx/mime.types;

    # Type par défaut si le type MIME n'est pas reconnu.
    default_type application/octet-stream;

    # Format des access logs : IP, requête, statut, referer, user-agent et IP forwardée.
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # Fichier où sont écrits les logs de trafic HTTP.
    access_log /var/log/nginx/access.log main;

    # Active l'envoi optimisé des fichiers par le kernel.
    sendfile on;

    # Optimise l'envoi des headers TCP avec sendfile.
    tcp_nopush on;

    # Réduit la latence pour les réponses proxifiées/interactives.
    tcp_nodelay on;

    # Durée de maintien des connexions HTTP keep-alive.
    keepalive_timeout 65;

    # Taille de hash pour la table des types MIME.
    types_hash_max_size 2048;

    # Taille maximale globale des uploads/requêtes client.
    client_max_body_size 120M;

    # Active la compression Gzip pour réduire le poids des réponses texte.
    gzip on;

    # Ajoute l'en-tête Vary: Accept-Encoding pour les caches/proxies.
    gzip_vary on;

    # Ne compresse que les réponses au-dessus de 1KB.
    gzip_min_length 1024;

    # Autorise la compression même derrière un proxy.
    gzip_proxied any;

    # Niveau de compression : compromis entre CPU et taille.
    gzip_comp_level 6;

    # Types de contenus compressés.
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Empêche l'embarquement du site dans une iframe externe.
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Active la protection XSS historique des navigateurs compatibles.
    add_header X-XSS-Protection "1; mode=block" always;

    # Empêche le navigateur de deviner un mauvais type MIME.
    add_header X-Content-Type-Options "nosniff" always;

    # Limite les informations envoyées dans l'en-tête Referer.
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Politique CSP globale. À durcir progressivement si toutes les sources externes sont maîtrisées.
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # Zone de rate limiting pour les routes API.
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # Zone de rate limiting plus stricte pour les connexions/login.
    limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;

    # Charge les virtual hosts / server blocks déclarés dans conf.d.
    # Exemple : docker/nginx/default.conf est monté vers /etc/nginx/conf.d/default.conf.
    include /etc/nginx/conf.d/*.conf;
}